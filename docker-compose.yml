services:
  mysql:
    image: mysql:5.7
    container_name: hmdp-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: "123"
      MYSQL_DATABASE: hmdp
    ports:
      - "3306:3306"
    volumes:
      - ./resources/db/hmdp.sql:/docker-entrypoint-initdb.d/01-hmdp.sql:ro
      - hmdp-mysql-data:/var/lib/mysql

  redis:
    image: redis:6.2
    container_name: hmdp-redis
    command: redis-server --requirepass 123321 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - hmdp-redis-data:/data

volumes:
  hmdp-mysql-data:
  hmdp-redis-data:

